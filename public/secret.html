<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>EmulatorJS</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #game {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="game"></div>
    <script type="text/javascript">
        window.EJS_player = '#game';
        window.EJS_core = 'prboom';
        window.EJS_gameName = 'Secret Shareware';
        window.EJS_color = '#e13d3d';
        window.EJS_startOnLoaded = true;
        window.EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/';
        window.EJS_gameUrl = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/') + 'secret.WAD';
    </script>
    <script src="https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/loader.js"></script>
</body>

</html>
